# Unity Catalog as the catalog implementation
spark.sql.catalog.unity = io.unitycatalog.spark.UCSingleCatalog
spark.sql.catalog.unity.uri = http://unity-catalog-server:8080
spark.sql.catalog.unity.token =
spark.sql.defaultCatalog = unity

spark.master=spark://spark-master:7077
spark.executor.cores=4
spark.cores.max=4
spark.executor.memory=8g
spark.sql.adaptive.enabled=true
spark.sql.extensions = io.delta.sql.DeltaSparkSessionExtension

# Delta Lake 3.2.1 + AWS SDK + UC connector
spark.jars=/opt/kyuubi/jars/delta-spark_2.12-3.2.1.jar,/opt/kyuubi/jars/delta-storage-3.2.1.jar,/opt/kyuubi/jars/hadoop-aws-3.3.2.jar,/opt/kyuubi/jars/aws-java-sdk-1.12.137.jar,/opt/kyuubi/jars/s3-2.18.41.jar,/opt/kyuubi/jars/aws-java-sdk-bundle-1.11.1026.jar,/opt/kyuubi/jars/unitycatalog-spark_2.12-0.2.0.jar

# S3/MinIO access
spark.hadoop.fs.defaultFS = s3a://datalake-gold
spark.hadoop.fs.s3a.impl = org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled = false
spark.hadoop.fs.s3a.aws.credentials.provider = org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
spark.hadoop.fs.s3a.access.key = accesskey
spark.hadoop.fs.s3a.secret.key = secretkey
spark.hadoop.fs.s3a.endpoint = http://minio:9000
spark.hadoop.fs.s3a.path.style.access = true

# Increase Kyuubi session engine initialization timeout
kyuubi.session.engine.initialize.timeout=2400000