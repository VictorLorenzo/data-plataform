# Default system properties included when running spark-submit.
# This is useful for setting default environmental settings.

# Example:
# spark.master                     spark://master:7077
# spark.eventLog.enabled           true
# spark.eventLog.dir               hdfs://localhost:9000/user
# spark.serializer                 org.apache.spark.serializer.KryoSerializer
# spark.driver.memory              5g
# spark.executor.extraJavaOptions  -XX:+PrintGCDetails -Dkey=value -Dnumbers="one two three"


# Delta Lake 3.2.1 + AWS SDK + Kyuubi extensions + Unity Catalog connector
spark.jars                                          /usr/local/spark/jars/delta-spark_2.12-3.2.1.jar,/usr/local/spark/jars/delta-storage-3.2.1.jar,/usr/local/spark/jars/hadoop-aws-3.3.2.jar,/usr/local/spark/jars/aws-java-sdk-1.12.137.jar,/usr/local/spark/jars/s3-2.18.41.jar,/usr/local/spark/jars/aws-java-sdk-bundle-1.11.1026.jar,/usr/local/spark/jars/kyuubi-hive-jdbc-shaded-1.9.1.jar,/usr/local/spark/jars/kyuubi-extension-spark-jdbc-dialect_2.12-1.9.1.jar,/usr/local/spark/jars/unitycatalog-spark_2.12-0.2.0.jar
spark.sql.extensions                                io.delta.sql.DeltaSparkSessionExtension,org.apache.spark.sql.dialect.KyuubiSparkJdbcDialectExtension

# Unity Catalog as the catalog implementation
spark.sql.catalog.unity                             io.unitycatalog.spark.UCSingleCatalog
spark.sql.catalog.unity.uri                         http://unity-catalog-server:8080
spark.sql.catalog.unity.token
spark.sql.defaultCatalog                            unity

# S3/MinIO access
spark.hadoop.fs.s3a.endpoint                        http://minio:9000
spark.hadoop.fs.s3a.access.key                      accesskey
spark.hadoop.fs.s3a.secret.key                      secretkey
spark.hadoop.fs.s3a.path.style.access               true
spark.hadoop.fs.s3a.connection.ssl.enabled          false
spark.hadoop.fs.s3a.impl                            org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider        org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
spark.sql.warehouse.dir                             s3a://datalake-gold/warehouse
spark.master                                        spark://spark-master:7077
spark.executor.cores                                2
spark.cores.max                                     4