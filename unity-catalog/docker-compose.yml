version: "3"

services:
  postgres-uc:
    hostname: postgres-uc
    container_name: postgres-uc
    image: postgres:13
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: uc_admin
      POSTGRES_PASSWORD: uc_admin
      POSTGRES_DB: unity_catalog_db
    volumes:
      - uc_catalog:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uc_admin -d unity_catalog_db"]
      interval: 5s
      timeout: 10s
      retries: 10

  unity-catalog-server:
    hostname: unity-catalog-server
    container_name: unity-catalog-server
    image: unitycatalog/unitycatalog:v0.2.1
    ports:
      - "8087:8080"
      - "3001:3000"
    volumes:
      - ./config/server.properties:/home/unitycatalog/etc/conf/server.properties
      - ./config/hibernate.properties:/home/unitycatalog/etc/conf/hibernate.properties
      - uc_data:/home/unitycatalog/etc/data
    depends_on:
      postgres-uc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --spider -q http://localhost:8080/api/2.1/unity-catalog/catalogs || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      default:
        aliases:
          - server

  unity-catalog-ui:
    container_name: unity-catalog-ui
    image: unitycatalog/unitycatalog-ui:main
    # This forces the UI to share the exact same 'localhost' as the server
    network_mode: "service:unity-catalog-server"
    depends_on:
      - unity-catalog-server

  uc-init:
    hostname: uc-init
    container_name: uc-init
    image: curlimages/curl:latest
    depends_on:
      unity-catalog-server:
        condition: service_healthy
    volumes:
      - ./scripts/init-uc.sh:/init-uc.sh
    entrypoint: ["sh", "/init-uc.sh"]

volumes:
  uc_catalog:
    driver: local
  uc_data:
    driver: local

networks:
  default:
    name: data-plataform
    external: true
