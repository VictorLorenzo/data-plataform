# Default system properties included when running spark-submit.
# This is useful for setting default environmental settings.

# Example:
# spark.master                     spark://master:7077
# spark.eventLog.enabled           true
# spark.eventLog.dir               hdfs://localhost:9000/user
# spark.serializer                 org.apache.spark.serializer.KryoSerializer
# spark.driver.memory              5g
# spark.executor.extraJavaOptions  -XX:+PrintGCDetails -Dkey=value -Dnumbers="one two three"


# Delta Lake 3.2.1 + AWS SDK + Unity Catalog connector
spark.jars = jars/delta-spark_2.12-3.2.1.jar,jars/delta-storage-3.2.1.jar,jars/hadoop-aws-3.3.6.jar,jars/aws-java-sdk-bundle-1.12.367.jar,jars/unitycatalog-spark_2.12-0.2.1.jar,jars/delta-iceberg_2.12-3.2.1.jar
spark.sql.extensions = io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog = org.apache.spark.sql.delta.catalog.DeltaCatalog
spark.driver.extraJavaOptions = -Dderby.system.home=/tmp -Djavax.jdo.option.ConnectionURL=jdbc:derby:;databaseName=metastore_db;create=true -Ddatanucleus.schema.autoCreateTables=true -Ddatanucleus.schema.autoCreateAll=true

# Unity Catalog as the single catalog implementation
spark.sql.catalog.datalake_uc = io.unitycatalog.spark.UCSingleCatalog
spark.sql.catalog.datalake_uc.uri = http://unity-catalog-server:8080
spark.sql.catalog.datalake_uc.token =
spark.sql.defaultCatalog = datalake_uc

# S3/MinIO access
spark.hadoop.fs.s3a.impl = org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3.impl = org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.endpoint = http://minio:9000
spark.hadoop.fs.s3.endpoint = http://minio:9000
spark.hadoop.fs.s3a.access.key = accesskey
spark.hadoop.fs.s3a.secret.key = secretkey
spark.hadoop.fs.s3a.path.style.access = true
spark.hadoop.fs.s3a.connection.ssl.enabled = false

spark.sql.warehouse.dir = s3://datalake-uc/warehouse