services:

  nifi:
    build:
      context: .
      dockerfile: ./docker/nifi/Dockerfile
    container_name: nifi
    volumes:
      - nifi_database_repository:/opt/nifi/nifi-current/database_repository
      - nifi_flowfile_repository:/opt/nifi/nifi-current/flowfile_repository
      - nifi_content_repository:/opt/nifi/nifi-current/content_repository
      - nifi_provenance_repository:/opt/nifi/nifi-current/provenance_repository
      - nifi_state:/opt/nifi/nifi-current/state
      - nifi_logs:/opt/nifi/nifi-current/logs
      - ./minio_sites:/opt/nifi/nifi-current/minio_sites
      - nifi_conf:/opt/nifi/nifi-current/conf
      - nifi_drivers:/opt/nifi/drivers
    ports:
      - 8443:8443
      - 443:443
    environment:
      - NIFI_WEB_HTTPS_PORT=8443
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=admin123456789
      - NIFI_SENSITIVE_PROPS_KEY='12345678901234567890A'
    restart: always
    healthcheck:
      test: curl -k --fail https://localhost:8443/nifi-api/access/config || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  nifi_conf:
    driver: local
  nifi_database_repository:
    driver: local
  nifi_flowfile_repository:
    driver: local
  nifi_content_repository:
    driver: local
  nifi_provenance_repository:
    driver: local
  nifi_state:
    driver: local
  nifi_logs:
    driver: local
  nifi_drivers:
    driver: local

networks:
  default:
    name: data-plataform
    external: true
